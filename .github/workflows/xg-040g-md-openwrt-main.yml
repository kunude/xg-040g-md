name: Build_XG_040G_MD_OpenWrt_Main
permissions:
  contents: write
  actions: write
true:
  workflow_dispatch:
    inputs:
      log_switch:
        description: Build logs
        required: false
        default: false
        type: boolean
  push:
    branches:
    - main
    paths:
    - .github/workflows/xg-040g-md-openwrt-main.yml
    - config/**
    - scripts/**
    - patch/**
    - feeds.conf.default
env:
  CONFIG_FILE: config/xg-040g-md.config
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: '[keep-release]'
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
    - name: Space usage check
      run: df -h
    - name: Setup environment dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: ${{ env.TZ }}
      run: "sudo apt update\nsudo apt purge -y python3-distutils || true\nsudo apt\
        \ autoremove -y\nsudo apt install -y \\\n  build-essential clang flex bison\
        \ g++ gawk \\\n  gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev\
        \ \\\n  python3-setuptools rsync swig unzip zlib1g-dev file wget \\\n  mkbootimg\
        \ device-tree-compiler ccache \\\n  lua5.3 liblua5.3-dev libreadline-dev liblua5.3-0\n\
        if command -v mkbootimg >/dev/null 2>&1; then\n  echo \"mkbootimg found at:\
        \ $(command -v mkbootimg)\"\nelse\n  echo \"❌ mkbootimg not found in PATH!\"\
        \nfi\n\nif [[ -n \"$TZ\" ]]; then\n  sudo timedatectl set-timezone \"$TZ\"\
        \nelse\n  echo \"TZ is not set, skipping timezone setup.\"\nfi\n"
    - name: Ensure Python build tools
      run: 'python3 -m pip install --upgrade pip setuptools wheel

        python3 -m pip install Unidecode

        '
    - name: Clone OpenWrt source code (openwrt-main)
      run: 'git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

        '
    - name: Move build dirs to /mnt/openwrt
      run: 'sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}

        sudo chown -R "$USER:$(id -gn)" /mnt/openwrt

        rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir

        ln -sfn /mnt/openwrt/dl openwrt/dl

        ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir

        ln -sfn /mnt/openwrt/build_dir openwrt/build_dir

        df -h

        '
    - name: Restore dl cache
      uses: actions/cache@v4
      with:
        path: /mnt/openwrt/dl
        key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default')
          }}
        restore-keys: '${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

          '
    - name: Restore ccache
      uses: actions/cache/restore@v4
      with:
        path: /mnt/openwrt/ccache
        key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id
          }}
        restore-keys: '${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

          '
    - name: Setup ccache
      run: 'mkdir -p "$CCACHE_DIR"

        ccache -M "$CCACHE_MAXSIZE"

        echo "ccache dir: $CCACHE_DIR"

        ccache -s

        '
    - name: Update & Install feeds
      working-directory: ./openwrt
      run: './scripts/feeds update -a

        ./scripts/feeds install -a -f

        '
    - name: Install third-party packages (homeproxy, passwall)
      working-directory: ./openwrt/package
      run: 'chmod +x $GITHUB_WORKSPACE/scripts/update-packages.sh

        bash $GITHUB_WORKSPACE/scripts/update-packages.sh

        '
    - name: Copy configuration and defconfig
      run: 'cp -fv "${CONFIG_FILE}" openwrt/.config

        cd openwrt && make defconfig

        [ -e .config ] && cp .config defconfig-final.config

        '
    - name: Apply static library optimization
      run: "    cd openwrt\n    \n    # 应用统一静态库配置\n    echo \"CONFIG_STATIC=y\" >>\
        \ .config\n    echo \"CONFIG_BUILD_SHARED=n\" >> .config\n    \n    # 重新配置\n\
        \    make defconfig"
    - name: Apply unified static library optimization
      working-directory: ./openwrt
      run: |
        echo "应用统一静态库配置..."
        
        # 启用静态库编译
        echo "CONFIG_STATIC=y" >> .config
        echo "CONFIG_BUILD_SHARED=n" >> .config
        
        # 优化静态库配置
        echo "CONFIG_PKG_STATIC=y" >> .config
        echo "CONFIG_BUILD_STATIC=y" >> .config
        
        # 重新配置以应用更改
        make defconfig
        
        # 验证配置
        echo "=== 静态库配置验证 ==="
        grep -E "CONFIG_(STATIC|BUILD)" .config
    - name: Upload build config files
      uses: actions/upload-artifact@v6
      with:
        name: build-config
        path: 'config/xg-040g-md.config

          openwrt/defconfig-final.config

          openwrt/feeds.conf.default

          '
    - name: Download packages
      working-directory: ./openwrt
      run: 'make download -j4 V=s

        # Remove small incomplete files <1KB

        find dl -size -1024c -delete

        '
    - name: Compile OpenWrt firmware
      id: compile
      run: "cd openwrt\necho \"Disk usage before compile:\"\ndf -h\nif [[ \"${{ inputs.log_switch\
        \ }}\" == \"true\" ]]; then\n  make -j1 V=s || {\n    echo \"Compile failed,\
        \ disk usage diagnostics:\"\n    df -h\n    du -h -d1 . | sort -h | tail -n\
        \ 30\n    exit 1\n  }\nelse\n  make -j$(nproc) || {\n    echo \"Compile failed,\
        \ disk usage diagnostics:\"\n    df -h\n    du -h -d1 . | sort -h | tail -n\
        \ 30\n    exit 1\n  }\nfi\nDEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y'\
        \ .config | head -1 | sed 's/.*DEVICE_\\(.*\\)=y/\\1/')\nif [[ -n \"$DEVICE_NAME\"\
        \ ]]; then\n  echo \"DEVICE_NAME=_${DEVICE_NAME}\" >> \"$GITHUB_ENV\"\nfi\n\
        echo \"FILE_DATE=_$(date +%Y%m%d%H%M)\" >> \"$GITHUB_ENV\"\necho \"status=success\"\
        \ >> $GITHUB_OUTPUT\necho \"ccache stats (env CCACHE_DIR=$CCACHE_DIR):\"\n\
        ccache -s || true\n"
    - name: Save ccache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: /mnt/openwrt/ccache
        key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id
          }}
    - name: Prepare firmware artifacts path
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true'
      run: 'cd openwrt/bin/targets/*/*

        rm -rf packages

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

        '
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v6
      if: env.UPLOAD_FIRMWARE == 'true'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}/*
    - name: Generate release tag and notes
      id: tag
      if: env.UPLOAD_RELEASE == 'true'
      run: 'echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

        cat <<EOF > release.txt

        🚀 OpenWrt firmware for XG-040G-MD (openwrt-main)

        ----------------------

        设备型号: XG-040G-MD

        构建时间: $(date +"%Y-%m-%d %H:%M")

        内核版本: 6.12.X

        源码仓库: $REPO_URL

        分支: $REPO_BRANCH

        EOF

        '
    - name: Publish GitHub Release
      uses: ncipollo/release-action@v1
      if: env.UPLOAD_RELEASE == 'true'
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: release.txt
        artifacts: '${{ env.FIRMWARE }}/*

          '
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Cleanup workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 7
        keep_minimum_runs: 5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Cleanup old GitHub Releases
      if: env.UPLOAD_RELEASE == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
        KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
      run: bash scripts/cleanup-old-releases.sh
