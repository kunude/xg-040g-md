name: Build_XG_040G_MD_OpenWrt_Main

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-main.yml"
      - "config/**"
      - "scripts/**"
      - "patch/**"
      - "feeds.conf.default"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: Space usage check
        run: df -h

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            mkbootimg device-tree-compiler ccache
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code (openwrt-main)
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Move build dirs to /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-

      - name: Setup ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          ccache -s

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Install third-party packages (homeproxy, passwall)
        working-directory: ./openwrt/package
        run: |
          chmod +x $GITHUB_WORKSPACE/scripts/update-packages.sh
          bash $GITHUB_WORKSPACE/scripts/update-packages.sh

      - name: Debug CUPS Feed Status
        working-directory: ./openwrt
        run: |
          echo "===== CUPS FEED DEBUG START ====="
          echo "检查 CUPS 核心包:"
          ./scripts/feeds list | grep -i "^cups$" || echo "❌ CUPS 核心包未找到"
          echo "检查 LuCI CUPS 管理界面:"
          ./scripts/feeds list | grep -i "luci.*cups" || echo "⚠️  luci-app-cups 未找到"
          echo "检查 CUPS 依赖包:"
          ./scripts/feeds list | grep -iE "(libcups|cups-filters|ghostscript)" || echo "⚠️  CUPS 依赖包不完整"
          echo "检查所有可用的 LuCI 应用:"
          ./scripts/feeds list | grep -i "luci-app" | head -30
          echo "===== CUPS FEED DEBUG END ====="

      - name: Fix APK DEVICE_PACKAGES for XG-040G-MD
        working-directory: ./openwrt
        run: |
          echo "===== APK DEVICE_PACKAGES FIX START ====="
          echo "检查当前设备 Makefile:"
          cat target/linux/airoha/image/an7581.mk | grep -A 20 "define Device/bell_xg-040g-md"
          
          echo "备份原始 Makefile:"
          cp target/linux/airoha/image/an7581.mk target/linux/airoha/image/an7581.mk.bak
          
          echo "修改 DEVICE_PACKAGES 以包含 CUPS 和 LuCI:"
          sed -i '/define Device\/bell_xg-040g-md/,/endef/{
            s/DEVICE_PACKAGES := \(.*\)/DEVICE_PACKAGES := \1 luci luci-ssl luci-theme-argon luci-app-argon-config cups libcups cups-filters kmod-usb-printer luci-app-cups/
          }' target/linux/airoha/image/an7581.mk
          
          echo "验证修改后的 DEVICE_PACKAGES:"
          cat target/linux/airoha/image/an7581.mk | grep -A 20 "define Device/bell_xg-040g-md"
          echo "===== APK DEVICE_PACKAGES FIX END ====="

      - name: Explicitly Install CUPS and LuCI Packages
        working-directory: ./openwrt
        run: |
          echo "===== EXPLICIT CUPS INSTALLATION ====="
          echo "强制安装 CUPS 核心包:"
          ./scripts/feeds install cups libcups cups-filters || echo "部分 CUPS 包安装失败"
          echo "安装 LPR/LPQ 打印工具:"
          ./scripts/feeds install lpr lpq || echo "⚠️  lpr/lpq 包可能不存在，使用 cups-client 替代"
          echo "检查 cups-client 包:"
          ./scripts/feeds list | grep -i "cups.*client" || echo "cups-client 也不可用"
          echo "尝试安装 luci-app-cups (main 分支标准包名):"
          ./scripts/feeds install luci-app-cups || echo "⚠️  luci-app-cups 安装失败"
          echo "检查已安装的包:"
          ./scripts/feeds list | grep -E "^(cups|libcups|cups-filters|lpr|lpq|luci-app-cups)" | sort
          echo "===== EXPLICIT INSTALLATION END ====="

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Fix CUPS Configuration for Main Branch
        working-directory: ./openwrt
        run: |
          echo "===== CUPS CONFIG FIX START ====="
          echo "确保 CUPS 核心包被选中:"
          echo "CONFIG_PACKAGE_cups=y" >> .config
          echo "CONFIG_PACKAGE_libcups=y" >> .config
          echo "CONFIG_PACKAGE_cups-filters=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-printer=y" >> .config
          
          echo "确保 LPR/LPQ 包被选中:"
          echo "CONFIG_PACKAGE_lpr=y" >> .config
          echo "CONFIG_PACKAGE_lpq=y" >> .config
          
          echo "确保 LuCI 核心包被选中:"
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          
          echo "选择 luci-app-cups (main 分支标准包名):"
          echo "CONFIG_PACKAGE_luci-app-cups=y" >> .config
          
          echo "禁用 APK 自动优化以确保包被包含:"
          echo "CONFIG_APK_NO_AUTO_OPTIMIZE=y" >> .config
          echo "CONFIG_APK_STRICT_DEPENDENCIES=n" >> .config
          
          echo "重新运行 defconfig 以应用更改:"
          make defconfig V=s
          
          echo "验证最终配置:"
          grep -E "CONFIG_PACKAGE_(cups|libcups|lpr|lpq|luci|luci-app-cups)" .config | sort
          echo "验证 APK 优化配置:"
          grep -E "CONFIG_APK_" .config | sort
          echo "===== CUPS CONFIG FIX END ====="

      - name: Force APK Packages for XG-040G-MD
        working-directory: ./openwrt
        run: |
          echo "===== FORCE APK PACKAGES START ====="
          echo "创建 APK 包强制选择文件:"
          cat > package/base-files/apk-force-packages << 'EOF'
          # Force include these packages for XG-040G-MD
          # This file is auto-generated by build workflow
          APK_FORCED_PACKAGES="luci luci-ssl luci-theme-argon luci-app-argon-config cups libcups cups-filters kmod-usb-printer luci-app-cups"
          EOF
          
          echo "验证 APK 强制包文件:"
          cat package/base-files/apk-force-packages
          
          echo "检查 APK 配置:"
          grep -r "APK_DEFAULT_PACKAGES" target/linux/airoha/ || echo "No APK_DEFAULT_PACKAGES found"
          
          echo "创建统一的 APK 编译脚本:"
          cat > /tmp/compile-apks.sh << 'EOF'
          #!/bin/bash
          # 统一编译 APK 包脚本
          set -e
          
          APK_PACKAGES=(
              "apk"
              "apk-mbedtls" 
              "openwrt-keyring"
              "libcups"
              "cups"
              "cups-filters"
              "kmod-usb-printer"
              "luci"
              "luci-ssl"
              "luci-theme-argon"
              "luci-app-argon-config"
              "luci-app-cups"
          )
          
          echo "=== 开始批量编译 APK 包 ==="
          for pkg in "${APK_PACKAGES[@]}"; do
              echo "📦 编译包: $pkg"
              make package/$pkg/compile -j$(nproc) || {
                  echo "❌ 编译失败: $pkg"
                  exit 1
              }
          done
          echo "✅ 所有 APK 包编译完成"
          EOF
          
          chmod +x /tmp/compile-apks.sh
          echo "===== FORCE APK PACKAGES END ====="

      - name: Debug CUPS Config Status
        working-directory: ./openwrt
        run: |
          echo "===== CUPS CONFIG DEBUG START ====="
          echo "检查 .config 中 CUPS 的最终状态:"
          grep "CONFIG_PACKAGE_cups" .config || echo "❌ CUPS 未被选中"
          grep "CONFIG_PACKAGE_libcups" .config || echo "❌ libcups 未被选中"
          grep "CONFIG_PACKAGE_luci-app-cups" .config || echo "⚠️  luci-app-cups 未被选中"
          echo "检查关键依赖状态:"
          grep "CONFIG_PACKAGE_libusb-1.0" .config || echo "⚠️  libusb 未选中"
          grep "CONFIG_PACKAGE_kmod-usb-printer" .config || echo "⚠️  kmod-usb-printer 未选中"
          echo "检查 LuCI 状态:"
          grep "CONFIG_PACKAGE_luci=" .config || echo "❌ LuCI 未被选中"
          echo "===== CUPS CONFIG DEBUG END ====="

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Unified APK Package Compilation
        working-directory: ./openwrt
        run: |
          echo "===== UNIFIED APK COMPILATION START ====="
          echo "执行统一的 APK 包编译..."
          
          # 先编译 APK 包管理器基础包
          echo "📦 编译 APK 基础包..."
          make package/apk/compile -j$(nproc)
          make package/apk-mbedtls/compile -j$(nproc)
          make package/openwrt-keyring/compile -j$(nproc)
          
          # 编译 CUPS 相关包（按依赖顺序）
          echo "🖨️  编译 CUPS 包..."
          make package/libcups/compile -j$(nproc)
          make package/cups/compile -j$(nproc)
          make package/cups-filters/compile -j$(nproc)
          make package/kmod-usb-printer/compile -j$(nproc)
          
          # 编译 LuCI 相关包
          echo "🎨 编译 LuCI 包..."
          make package/luci/compile -j$(nproc)
          make package/luci-ssl/compile -j$(nproc)
          make package/luci-theme-argon/compile -j$(nproc)
          make package/luci-app-argon-config/compile -j$(nproc)
          make package/luci-app-cups/compile -j$(nproc)
          
          echo "✅ APK 包统一编译完成"
          echo "验证编译的 APK 包:"
          find bin/packages -name "*.apk" | grep -E "(cups|luci)" | head -20
          echo "===== UNIFIED APK COMPILATION END ====="

      - name: Verify APK Packages Before Firmware Build
        working-directory: ./openwrt
        run: |
          echo "===== APK VERIFICATION START ====="
          echo "检查 CUPS APK 包:"
          find bin/packages -name "*cups*.apk" 2>/dev/null || echo "❌ 未找到 CUPS apk"
          echo "检查 LuCI APK 包:"
          find bin/packages -name "*luci*.apk" 2>/dev/null | head -10 || echo "❌ 未找到 LuCI apk"
          echo "检查 LPR/LPQ APK 包:"
          find bin/packages -name "*lpr*.apk" -o -name "*lpq*.apk" 2>/dev/null || echo "⚠️  未找到 LPR/LPQ apk"
          echo "检查 APK 包索引:"
          find bin/packages -name "APKINDEX.tar.gz" 2>/dev/null | head -5
          echo "===== APK VERIFICATION END ====="

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "Disk usage before compile:"
          df -h
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          else
            make -j$(nproc) || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v2-${{ github.run_id }}

      - name: Debug CUPS APK Output
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          echo "===== CUPS ARTIFACT DEBUG START ====="
          echo "搜索生成的 CUPS 安装包:"
          find bin/packages -name "*cups*.apk" 2>/dev/null || echo "❌ 未找到 CUPS apk"
          echo "检查 LPR/LPQ 安装包:"
          find bin/packages -name "*lpr*.apk" -o -name "*lpq*.apk" 2>/dev/null || echo "⚠️  未找到 LPR/LPQ apk"
          echo "检查 LuCI CUPS 安装包:"
          find bin/packages -name "*luci*cups*.apk" 2>/dev/null || echo "❌ 未找到 luci-app-cups apk"
          echo "列出所有 CUPS 相关包:"
          find bin/packages -name "*.apk" -exec grep -l "cups" {} \; 2>/dev/null | head -10
          echo "检查 LuCI 核心包:"
          find bin/packages -name "*luci*.apk" 2>/dev/null | head -20
          echo "检查 APK 包索引:"
          find bin/packages -name "APKINDEX.tar.gz" 2>/dev/null
          echo "===== CUPS ARTIFACT DEBUG END ====="

      - name: Create Unified APK Directory Structure
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          echo "===== UNIFIED APK DIRECTORY START ====="
          echo "创建统一的 APK 存放目录结构..."
          mkdir -p /tmp/openwrt-apks/{cups,luci,system,index}
          
          echo "复制 CUPS 相关 APK 包:"
          find bin/packages -name "*cups*.apk" -exec cp {} /tmp/openwrt-apks/cups/ \;
          find bin/packages -name "*libcups*.apk" -exec cp {} /tmp/openwrt-apks/cups/ \;
          find bin/packages -name "*kmod-usb-printer*.apk" -exec cp {} /tmp/openwrt-apks/cups/ \;
          find bin/packages -name "*cups-filters*.apk" -exec cp {} /tmp/openwrt-apks/cups/ \;
          
          echo "复制 LuCI 相关 APK 包:"
          find bin/packages -name "*luci*.apk" -exec cp {} /tmp/openwrt-apks/luci/ \;
          find bin/packages -name "*luci-app-argon*.apk" -exec cp {} /tmp/openwrt-apks/luci/ \;
          find bin/packages -name "*luci-theme-argon*.apk" -exec cp {} /tmp/openwrt-apks/luci/ \;
          
          echo "复制系统 APK 包:"
          find bin/packages -name "*apk*.apk" -exec cp {} /tmp/openwrt-apks/system/ \;
          find bin/packages -name "*openwrt-keyring*.apk" -exec cp {} /tmp/openwrt-apks/system/ \;
          
          echo "生成 APK 索引:"
          for dir in cups luci system; do
            (cd /tmp/openwrt-apks/$dir && ls -la *.apk > APKINDEX.txt 2>/dev/null || echo "目录为空: $dir")
          done
          
          echo "验证 APK 包完整性:"
          for apk in $(find /tmp/openwrt-apks -name "*.apk"); do
            echo "验证: $apk"
          done
          
          echo "APK 包统计:"
          echo "CUPS 包: $(ls /tmp/openwrt-apks/cups/*.apk 2>/dev/null | wc -l)"
          echo "LuCI 包: $(ls /tmp/openwrt-apks/luci/*.apk 2>/dev/null | wc -l)"
          echo "系统包: $(ls /tmp/openwrt-apks/system/*.apk 2>/dev/null | wc -l)"
          echo "===== UNIFIED APK DIRECTORY END ====="

      - name: Verify APK Packages in Firmware Image
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          echo "===== APK PACKAGE VERIFICATION START ====="
          echo "列出固件中的所有 APK 包:"
          # 尝试解压固件并检查包
          for img in bin/targets/*/*/*.{bin,img}; do
            [ -f "$img" ] || continue
            echo "检查固件: $img"
            # 使用 binwalk 或类似工具检查内容
            file "$img" | head -5
          done
          
          echo "检查 packages 目录的包列表:"
          ls -la bin/packages/*/ 2>/dev/null | head -20
          
          echo "验证 APK 索引完整性:"
          for idx in bin/packages/*/APKINDEX.tar.gz; do
            [ -f "$idx" ] || continue
            echo "索引: $idx"
            gzip -t "$idx" && echo "✓ 索引完整" || echo "✗ 索引损坏"
          done
          echo "===== APK PACKAGE VERIFICATION END ====="

      - name: Check LPR LPQ Compatibility
        working-directory: ./openwrt
        run: |
          echo "===== LPR LPQ COMPATIBILITY CHECK ====="
          echo "检查 lpr 包是否存在:"
          ./scripts/feeds list | grep -i "^lpr$" || echo "⚠️  lpr 包未找到"
          echo "检查 lpq 包是否存在:"
          ./scripts/feeds list | grep -i "^lpq$" || echo "⚠️  lpq 包未找到"
          echo "检查 legacy printing packages:"
          ./scripts/feeds list | grep -iE "(lpr|lpq|printproto|cups.*client)" | head -10
          echo "检查 cups-client 包 (APK 替代方案):"
          ./scripts/feeds list | grep -i "cups.*client" || echo "⚠️  cups-client 也不可用"
          echo "检查所有打印相关包:"
          ./scripts/feeds list | grep -iE "(cups|lpr|lpq|ghostscript|foomatic)" | sort
          echo "===== COMPATIBILITY CHECK END ====="

      - name: Create APK Override for XG-040G-MD
        working-directory: ./openwrt
        run: |
          echo "===== CREATE APK OVERRIDE START ====="
          echo "检查 APK 包选择机制:"
          grep -r "APK_PACKAGES\|APK_DEFAULT" target/linux/airoha/ || echo "未找到 APK 包选择配置"
          
          echo "创建设备特定的 APK 覆盖文件:"
          mkdir -p package/xg-040g-md-apk-override
          cat > package/xg-040g-md-apk-override/Makefile << 'EOF'
          #
          # APK Override for XG-040G-MD
          # Force include CUPS and LuCI packages in APK-based builds
          #
          
          define Package/xg-040g-md-apk-override
            TITLE:=XG-040G-MD APK Override
            DESCRIPTION:=Force include CUPS and LuCI packages
            DEFAULT:=y
            ifneq ($(wildcard $(STAGING_DIR)/bin/apk),)
            # Only apply when APK is available
          endef
          
          define Package/xg-040g-md-apk-override/install
            mkdir -p $(1)/etc/apk
            echo "luci luci-ssl luci-theme-argon luci-app-argon-config" > $(1)/etc/apk/forced-packages
            echo "cups libcups cups-filters kmod-usb-printer luci-app-cups" >> $(1)/etc/apk/forced-packages
          endef
          
          $(eval $(call BuildPackage,xg-040g-md-apk-override))
          EOF
          
          echo "验证 APK 覆盖文件:"
          cat package/xg-040g-md-apk-override/Makefile
          
          echo "将 APK 覆盖添加到 feeds:"
          echo "src-link xg-040g-md-apk-override $(PWD)/package/xg-040g-md-apk-override" >> feeds.conf.default
          
          echo "更新 feeds 以包含 APK 覆盖:"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          echo "===== CREATE APK OVERRIDE END ====="

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Upload unified APK packages
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_apks${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: /tmp/openwrt-apks/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-main)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: bash scripts/cleanup-old-releases.sh
